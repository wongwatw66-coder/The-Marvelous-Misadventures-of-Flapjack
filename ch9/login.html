<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
</head>

<body>
    <form id="loginForm">
        <label for="username">Username</label><br>
        <input type="text" id="username" placeholder="Enter username" required><br><br>

        <label for="password">Password</label><br>
        <input type="password" id="password" placeholder="Enter password" required><br><br>

        <label for="confirm_password">Confirm Password</label><br>
        <input type="password" id="confirm_password" placeholder="Confirm password" required><br><br>

        <button type="submit">Login</button>
    </form>

    <script>
        const form = document.getElementById("loginForm");

        form.addEventListener("submit", function (e) {
            e.preventDefault();

            const username = document.getElementById("username").value.trim();
            const password = document.getElementById("password").value;
            const confirmPassword = document.getElementById("confirm_password").value;

            if (!username || !password || !confirmPassword) {
                alert("โปรดใส่ข้อมูลให้ครบ");
            } else if (password !== confirmPassword) {
                alert("ใส่รหัสผ่านไม่ตรงกัน");
            } else {
                alert("เข้าสู่ระบบสำเร็จ");
            }
        });
    </script>
</body>
</html>
