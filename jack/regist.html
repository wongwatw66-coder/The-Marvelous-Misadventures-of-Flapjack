<!DOCTYPE html>
<html lang="en">
<head>
    <meta name="Viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <form action="">
        <labrl for="name">ชื่อ</labrl>
        <input type="text" id="name" name="name"
                placeholder="พิมพ์ชื่อ"><span style="color: red;">*</span>
        &nbsp;&nbsp;
        <labrl for="surname">นามสกุล</labrl>
        <input type="text" id="surname" name="surname"><span style="color: red;">*</span> <br>
        
        <labrl for="date">วัน เดือน ปี เกิด</labrl>
        <input type="date" name="date" id="date">
        &nbsp;&nbsp;
        <labrl for="age">อายุ</labrl>
        <input type="number" name="age" id="age"> <br><br>
        <label>Gender:</label>
        <input type="checkbox" name="gender" value="male"> Male
        <input type="checkbox" name="gender" value="female"> Female
        <br><br>

        <label for="email">Email:</label>
        <input type="email" id="email" name="email" placeholder="Enter email address" size="30">
        <span style="color: red;">*</span>
        <br>
        &nbsp;
        <input type="checkbox" id="confirm" name="confirm">
        <label for="confirm">ข้อมูลถูกต้อง</label>
        <br><br>

        <label for="pwd">Password =</label>
        <input type="password" id="pwd" name="pwd">
        <br>

        <label for="cpwd">Confirm password =</label>
        <input type="password" id="cpwd" name="cpwd">
        <br><br>

        <button type="submit">Submit</button>
    </form>
    
</body>
</html>
